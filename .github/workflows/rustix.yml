name: rustix-boot

on:
  schedule:
    # 每 6 小时跑一次 (避开整点, GitHub Actions 整点最拥堵会延迟)
    - cron: '17 */6 * * *'
  workflow_dispatch: {}   # 支持手动触发

# 避免上一次还没跑完就又触发, 排队串行
concurrency:
  group: rustix-boot
  cancel-in-progress: false

jobs:
  boot:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps + Chromium
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      # ---- 代理: 有 PROXY_STR 才启用 sing-box, 否则直连 ----
      - name: Setup sing-box proxy
        id: proxy
        env:
          PROXY_STR: ${{ secrets.PROXY_STR }}
        run: |
          if [ -z "$PROXY_STR" ]; then
            echo "未配置 PROXY_STR, 浏览器将直连"
            echo "browser_proxy=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "生成 sing-box 配置..."
          python convert_proxy.py

          echo "安装 sing-box..."
          SB_VER="1.9.3"
          curl -fsSL -o sing-box.tar.gz \
            "https://github.com/SagerNet/sing-box/releases/download/v${SB_VER}/sing-box-${SB_VER}-linux-amd64.tar.gz"
          tar -xzf sing-box.tar.gz
          sudo install "sing-box-${SB_VER}-linux-amd64/sing-box" /usr/local/bin/sing-box
          sing-box version

          echo "校验配置..."
          sing-box check -c config.json

          echo "后台启动 sing-box..."
          nohup sing-box run -c config.json > singbox.log 2>&1 &

          echo "等待本地代理 127.0.0.1:8080 就绪..."
          for i in $(seq 1 15); do
            if curl -s -m 8 -x http://127.0.0.1:8080 https://api.ipify.org > proxy_ip.txt; then
              IP="$(cat proxy_ip.txt)"
              # 脱敏: 只显示前两段, 如 203.0.x.x / IPv6 显示前缀; 完整 IP 不入日志
              if echo "$IP" | grep -q ':'; then
                MASKED="$(echo "$IP" | cut -d: -f1-2):x:x"
              else
                MASKED="$(echo "$IP" | cut -d. -f1-2).x.x"
              fi
              echo "代理已就绪, 出口 IP: ${MASKED}"
              echo "browser_proxy=http://127.0.0.1:8080" >> "$GITHUB_OUTPUT"
              rm -f proxy_ip.txt
              exit 0
            fi
            sleep 2
          done

          echo "::error::sing-box 代理启动失败 (日志已脱敏, 隐藏代理服务器地址)"
          # 脱敏: 掩码 IPv4、域名:端口、纯 host:port, 避免代理服务器地址泄进公开日志
          sed -E \
            -e 's/([0-9]{1,3}\.[0-9]{1,3})\.[0-9]{1,3}\.[0-9]{1,3}/\1.x.x/g' \
            -e 's/([A-Za-z0-9-]+\.)+[A-Za-z]{2,}(:[0-9]+)?/<host>\2/g' \
            singbox.log 2>/dev/null || echo "(无 singbox.log)"
          exit 1

      - name: Run
        env:
          ACCOUNTS: ${{ secrets.ACCOUNTS }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          BROWSER_PROXY: ${{ steps.proxy.outputs.browser_proxy }}
        run: python rustix_boot.py
